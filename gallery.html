    <style>
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            padding: 40px 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .gallery-grid img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.7);
            transition: transform 0.3s;
        }
        .gallery-grid img:hover {
            transform: scale(1.03);
        }
        .gallery-header {
            text-align: center;
            padding: 60px 20px 40px;
        }
    </style>
</head>
